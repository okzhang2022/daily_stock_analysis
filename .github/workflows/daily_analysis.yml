name: 每日股票分析

on:
  schedule:
    # 对应北京时间周二至周六凌晨 05:05（美股收盘后运行）
    - cron: '5 21 * * 1-5'
  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install markdown
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # AI 配置
          # ==========================================
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-flash' }}
          
          # ==========================================
          # 核心修正：针对美股和瘦身
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || 'AMD,INTC,MU' }}
          MARKET_REVIEW_REGION: "us"        # 强制设为美国市场
          MARKET_REVIEW_ENABLED: "false"     # 关闭大盘综述，只看个股，更精简
          REPORT_TYPE: "simple"             # 开启简易模式
          TRADING_DAY_CHECK_ENABLED: "false" # 防止时差导致交易日判断失败
          
          # 继承原有的所有 AI 密钥变量（此处略去冗长的列表，保留你原有的即可）
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          
        run: |
          # 1. 执行分析程序
          python main.py
          
          # 2. 强力瘦身脚本：物理删除废话
          echo "🧹 正在清理报告中的无效数据..."
          cd reports
          
          # 删除所有包含 N/A、数据缺失、或者为 0 的技术指标行
          sed -i '/N\/A/d' *.md
          sed -i '/数据缺失/d' *.md
          sed -i '/| 0 |/d' *.md
          sed -i '/| 0.0/d' *.md
          
          # 删除长表格板块（保留仪表盘和建议）
          sed -i '/当日行情/,/---/d' *.md
          sed -i '/数据透视/,/---/d' *.md
          sed -i '/检查清单/,/---/d' *.md
          
          echo "✅ 瘦身完成"

      - name: 生成并美化 HTML 网页
        run: |
          LATEST_MD=$(ls -t reports/report_*.md | head -1)
          if [ -n "$LATEST_MD" ]; then
            echo "<html><head><meta charset='utf-8'><title>美股收盘分析报告</title>
            <style>
              body { font-family: -apple-system, system-ui, sans-serif; line-height: 1.6; padding: 20px; max-width: 700px; margin: auto; background: #f0f2f5; }
              .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
              h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
              th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
              th { background: #f8f9fa; font-weight: 600; }
              strong { color: #d93025; }
              hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
            </style>
            </head><body><div class='card'>" > reports/index.html
            
            python -m markdown "$LATEST_MD" >> reports/index.html
            
            echo "</div></body></html>" >> reports/index.html
          else
            echo "<h1>今日未生成分析报告</h1>" > reports/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
