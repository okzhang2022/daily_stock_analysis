name: 每日股票分析

on:
  schedule:
    # 北京时间周二至周六凌晨 05:05（美股收盘后运行）
    - cron: '5 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'stocks-only'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: true
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install markdown
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # --- 核心配置：只看美股 ---
          STOCK_LIST: "AMD,INTC,MU"
          MARKET_REVIEW_REGION: "us"
          MARKET_REVIEW_ENABLED: "false"
          REPORT_TYPE: "simple"
          TRADING_DAY_CHECK_ENABLED: "false"
          
          # --- AI 密钥 (从你的 Secrets 自动读取) ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          
        run: |
          # 1. 运行主程序
          python main.py || echo "⚠️ 分析部分遇到异常，继续后续清理步骤"
          
          # 2. 物理瘦身：如果生成了报告，就删掉 N/A 行和冗余板块
          if [ -d "reports" ] && [ "$(ls -A reports/*.md 2>/dev/null)" ]; then
            echo "🧹 正在物理瘦身 Markdown 报告..."
            cd reports
            # 删除包含空数据的行
            sed -i '/N\/A/d' *.md
            sed -i '/数据缺失/d' *.md
            sed -i '/| 0 |/d' *.md
            sed -i '/| 0.0/d' *.md
            # 删除多余的大长段落板块
            sed -i '/当日行情/,/---/d' *.md
            sed -i '/数据透视/,/---/d' *.md
            sed -i '/检查清单/,/---/d' *.md
            cd ..
            echo "✅ 瘦身处理完成"
          else
            echo "❌ 未检测到 .md 报告文件"
          fi

      - name: 生成 HTML 网页
        run: |
          LATEST_MD=$(ls -t reports/report_*.md 2>/dev/null | head -1 || echo "")
          if [ -n "$LATEST_MD" ]; then
            echo "<html><head><meta charset='utf-8'><title>美股分析报告</title>
            <style>
              body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background: #f9f9f9; }
              .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
              table { width: 100%; border-collapse: collapse; }
              th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
              th { background: #f4f4f4; }
              strong { color: #d00; }
            </style>
            </head><body><div class='card'>" > reports/index.html
            python -m markdown "$LATEST_MD" >> reports/index.html
            echo "</div></body></html>" >> reports/index.html
          else
            echo "<html><body><h1>分析失败</h1><p>请去 Action 日志查看失败原因（通常是数据源 API 限制）。</p></body></html>" > reports/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 必须指向生成的 reports 目录
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
