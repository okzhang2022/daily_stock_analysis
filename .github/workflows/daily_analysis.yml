name: 每日股票分析

on:
  schedule:
    - cron: '5 21 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行'
        default: true
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install markdown
      
      - name: 执行股票分析
        env:
          STOCK_LIST: "AMD,INTC,MU"
          MARKET_REVIEW_REGION: "us"
          MARKET_REVIEW_ENABLED: "false"
          REPORT_TYPE: "simple"
          TRADING_DAY_CHECK_ENABLED: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p reports
          python main.py || echo "分析部分报错，尝试生成容错页面"
          
          # 物理瘦身（增加空文件夹保护）
          if [ -d "reports" ] && ls reports/*.md 1> /dev/null 2>&1; then
            echo "🧹 正在处理报告内容..."
            sed -i '/N\/A/d; /数据缺失/d; /| 0 |/d' reports/*.md
          fi

      - name: 生成 HTML 网页
        run: |
          LATEST_MD=$(ls -t reports/report_*.md 2>/dev/null | head -1 || echo "")
          echo "<html><head><meta charset='utf-8'><title>分析报告</title><style>body{font-family:sans-serif;padding:20px;max-width:800px;margin:auto;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ddd;padding:8px;}</style></head><body>" > reports/index.html
          if [ -n "$LATEST_MD" ]; then
            python -m markdown "$LATEST_MD" >> reports/index.html
          else
            echo "<h1>暂无分析数据</h1><p>请检查 API 密钥或数据源是否正常。</p>" >> reports/index.html
          fi
          echo "</body></html>" >> reports/index.html

      - name: 上传部署文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
